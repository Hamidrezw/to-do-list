<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Poppins", sans-serif;
      }
    </style>
  </head>

  <body class="bg-[#292f36] text-white min-h-screen flex flex-col items-center pt-20">

    <h1 class="text-5xl sm:text-7xl md:text-[8rem] font-bold text-[#12f7d6] select-none text-center">
      to do list
    </h1>

    <form
      id="form"
      class="w-full max-w-md mx-4 rounded-lg shadow-lg overflow-hidden mt-6"
    >
      <div class="flex">
        <input
          type="text"
          id="input"
          placeholder="Enter your todo"
          autocomplete="off"
          class="flex-1 bg-[#1a1e23] px-4 py-4 text-lg outline-none focus:ring-2 focus:ring-[#98faec]"
        />
        <button
          type="submit"
          class="bg-[#12f7d6] text-black px-6 font-semibold active:scale-95 transition"
        >
          Add
        </button>
      </div>

      <ul id="todos"></ul>
    </form>

    <small class="mt-5 text-gray-400 text-center">
      Tap to toggle. <br />
      <span class="hidden md:block">
        Right click to delete
      </span>
      <span class="block md:hidden">
        Swipe left to delete
      </span>
    </small>

    <script src="script.js"></script>
  </body>
</html>
